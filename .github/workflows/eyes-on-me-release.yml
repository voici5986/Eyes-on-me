name: eyes-on-me-release

on:
  # 手动触发：用于临时验证打包流程，或手动跑一次发版前检查。
  workflow_dispatch:
  push:
    # 只有推送 v1.2.3 这类版本标签时，才会真正执行发版构建。
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: eyes-on-me-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # 发版使用的完整跨平台打包矩阵，会为多个目标平台生成产物。
    name: release-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: amd64
            bin_ext: ""
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
            linker: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
            bin_ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: amd64
            bin_ext: .exe
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            platform: windows
            arch: arm64
            bin_ext: .exe
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
            bin_ext: ""
          - runner: macos-14
            target: x86_64-apple-darwin
            platform: darwin
            arch: amd64
            bin_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Linux cross linker
        if: runner.os == 'Linux' && matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install web dependencies
        working-directory: web
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: web
        shell: bash
        run: pnpm build

      - name: Build server
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        shell: bash
        run: cargo build --release --locked -p client-server --target "$TARGET_TRIPLE"

      - name: Build desktop
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        shell: bash
        run: cargo build --release --locked -p client-desktop --target "$TARGET_TRIPLE"

      - name: 准备发布文件（Unix）
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          release_dir="_dist/release-assets"
          server_name="Eyes_on_me-server-${{ matrix.platform }}-${{ matrix.arch }}"
          desktop_name="Eyes_on_me-desktop-${{ matrix.platform }}-${{ matrix.arch }}"

          mkdir -p "$release_dir"
          cp "target/${{ matrix.target }}/release/client-server${{ matrix.bin_ext }}" "$release_dir/${server_name}${{ matrix.bin_ext }}"
          cp "target/${{ matrix.target }}/release/client-desktop${{ matrix.bin_ext }}" "$release_dir/${desktop_name}${{ matrix.bin_ext }}"

      - name: 准备发布文件（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = "_dist/release-assets"
          $serverName = "Eyes_on_me-server-${{ matrix.platform }}-${{ matrix.arch }}"
          $desktopName = "Eyes_on_me-desktop-${{ matrix.platform }}-${{ matrix.arch }}"

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/client-server${{ matrix.bin_ext }}" "$releaseDir/${serverName}${{ matrix.bin_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/client-desktop${{ matrix.bin_ext }}" "$releaseDir/${desktopName}${{ matrix.bin_ext }}"

      - name: 上传发布资产
        uses: actions/upload-artifact@v4
        with:
          name: eyes-on-me-release-assets-${{ matrix.target }}
          path: _dist/release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    # 只有版本标签构建才会发布 GitHub Release。
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eyes-on-me-release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum Eyes_on_me-* > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Eyes on Me ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/Eyes_on_me-*
            release-assets/SHA256SUMS.txt
